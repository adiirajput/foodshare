<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FoodShare</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">🌿 Food<span>Share</span></a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/browse">Browse Food</a>
      <a href="/signup">Sign Up</a>
    </div>
  </div>
</nav>

<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:2rem;">
  <div class="name-entry" style="width:100%;">
    <div class="ne-icon">🔐</div>
    <h2>Welcome Back!</h2>
    <p>Login to your FoodShare account</p>

    <div id="alert-box"></div>

    <div class="form-group" style="text-align:left;">
      <label>Email <span class="req">*</span></label>
      <input type="email" id="email" class="form-control" placeholder="your@email.com"/>
    </div>
    <div class="form-group" style="text-align:left;">
      <label>Password <span class="req">*</span></label>
      <input type="password" id="password" class="form-control" placeholder="••••••••"/>
    </div>

    <button class="btn btn-lime btn-lg" style="width:100%; justify-content:center; margin-top:.5rem;" onclick="login()">
      Login
    </button>

    <p style="margin-top:1.2rem; font-size:.88rem; color:var(--muted);">
      Don't have an account? <a href="/signup" style="color:var(--sage); font-weight:600;">Sign Up</a>
    </p>
  </div>
</div>

<script>
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const alertBox = document.getElementById('alert-box');

  if (!email || !password) {
    alertBox.innerHTML = '<div class="alert alert-error">Please fill all fields!</div>';
    return;
  }

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      alertBox.innerHTML = '<div class="alert alert-success">✅ Login successful! Redirecting...</div>';
      setTimeout(() => {
        if (data.user.role === 'admin') window.location.href = '/admin';
        else if (data.user.role === 'donor') window.location.href = '/donor';
        else window.location.href = '/browse';
      }, 1000);
    } else {
      alertBox.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
    }
  } catch (err) {
    alertBox.innerHTML = '<div class="alert alert-error">❌ Something went wrong!</div>';
  }
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
